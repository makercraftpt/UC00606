<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 400" width="220" height="400">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
  </defs>

  <!-- INÍCIO (oval) -->
  <ellipse cx="110" cy="40" rx="55" ry="26" fill="#C8F7C5" stroke="#27AE60" stroke-width="2"/>
  <text x="110" y="45" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial" fill="#1A5C38">INÍCIO</text>

  <!-- seta -->
  <line x1="110" y1="66" x2="110" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- input (paralelogramo) -->
  <polygon points="28,108 188,108 172,150 12,150" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
  <text x="100" y="126" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial" fill="#1A5276">nome = input(</text>
  <text x="100" y="143" text-anchor="middle" font-size="10" font-family="Arial" fill="#1A5276">"Qual o teu nome?")</text>

  <!-- seta -->
  <line x1="110" y1="150" x2="110" y2="210" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- print (paralelogramo) -->
  <polygon points="28,218 188,218 172,258 12,258" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
  <text x="100" y="241" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial" fill="#1A5276">print("Olá,", nome)</text>

  <!-- seta -->
  <line x1="110" y1="258" x2="110" y2="334" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- FIM (oval) -->
  <ellipse cx="110" cy="360" rx="55" ry="26" fill="#C8F7C5" stroke="#27AE60" stroke-width="2"/>
  <text x="110" y="365" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial" fill="#1A5C38">FIM</text>

</svg>
