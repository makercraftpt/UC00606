<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 500" width="340" height="500">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
  </defs>
  <!-- INÍCIO -->
  <ellipse cx="100" cy="36" rx="55" ry="24" fill="#C8F7C5" stroke="#27AE60" stroke-width="2"/>
  <text x="100" y="41" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial" fill="#1A5C38">INÍCIO</text>
  <line x1="100" y1="60" x2="100" y2="88" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <!-- Decisão 1 -->
  <polygon points="100,93 175,133 100,173 25,133" fill="#FEF9E7" stroke="#F39C12" stroke-width="2"/>
  <text x="100" y="129" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial" fill="#7D6608">nivel == 1?</text>
  <!-- Sim → direita -->
  <line x1="175" y1="133" x2="240" y2="133" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="200" y="126" font-size="10" font-family="Arial" fill="#27AE60" font-weight="bold">Sim</text>
  <polygon points="225,120 320,120 308,148 213,148" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
  <text x="267" y="138" text-anchor="middle" font-size="10" font-family="Arial" fill="#1A5276">print("Iniciante")</text>
  <!-- Não → baixo -->
  <line x1="100" y1="173" x2="100" y2="198" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="108" y="190" font-size="10" font-family="Arial" fill="#E74C3C" font-weight="bold">Não</text>
  <!-- Decisão 2 -->
  <polygon points="100,203 175,243 100,283 25,243" fill="#FEF9E7" stroke="#F39C12" stroke-width="2"/>
  <text x="100" y="239" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial" fill="#7D6608">nivel == 2?</text>
  <!-- Sim → direita -->
  <line x1="175" y1="243" x2="240" y2="243" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="200" y="236" font-size="10" font-family="Arial" fill="#27AE60" font-weight="bold">Sim</text>
  <polygon points="225,230 320,230 308,258 213,258" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
  <text x="267" y="248" text-anchor="middle" font-size="10" font-family="Arial" fill="#1A5276">print("Intermédio")</text>
  <!-- Não → baixo (else) -->
  <line x1="100" y1="283" x2="100" y2="308" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="108" y="300" font-size="10" font-family="Arial" fill="#E74C3C" font-weight="bold">Não</text>
  <polygon points="35,315 175,315 163,345 23,345" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
  <text x="99" y="334" text-anchor="middle" font-size="10" font-family="Arial" fill="#1A5276">print("Avançado")</text>
  <!-- join all to FIM -->
  <line x1="267" y1="148" x2="267" y2="408" stroke="#444" stroke-width="2"/>
  <line x1="267" y1="258" x2="267" y2="408" stroke="#444" stroke-width="2"/>
  <line x1="99" y1="345" x2="99" y2="408" stroke="#444" stroke-width="2"/>
  <line x1="99" y1="408" x2="267" y2="408" stroke="#444" stroke-width="2"/>
  <line x1="183" y1="408" x2="183" y2="435" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <!-- FIM -->
  <ellipse cx="183" cy="460" rx="55" ry="24" fill="#C8F7C5" stroke="#27AE60" stroke-width="2"/>
  <text x="183" y="465" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial" fill="#1A5C38">FIM</text>
</svg>